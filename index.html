<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferretería Pro - Inventario</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #1d4ed8; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; }
        table { width: 100%; max-width: 600px; margin-top: 20px; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th { background: #1e40af; color: white; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
    </style>
</head>
<body>

    <h1>🛠️ Control de Inventario</h1>

    <div class="card">
        <h3>Agregar Nuevo Producto</h3>
        <input type="text" id="nombre" placeholder="Nombre (ej. Martillo)">
        <input type="number" id="cantidad" placeholder="Cantidad">
        <input type="number" id="precio" placeholder="Precio ($)">
        <button onclick="guardarProducto()">Guardar en Inventario</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Producto</th>
                <th>Stock</th>
                <th>Precio</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="lista-productos"></tbody>
    </table>

    <script>
        // 1. Cargar datos apenas abre la página
        document.addEventListener('DOMContentLoaded', mostrarProductos);

        function guardarProducto() {
            const nombre = document.getElementById('nombre').value;
            const cantidad = document.getElementById('cantidad').value;
            const precio = document.getElementById('precio').value;

            if(!nombre || !cantidad || !precio) {
                alert("¡Faltan datos, primo!");
                return;
            }

            const producto = { nombre, cantidad, precio };
            
            // Traer lo que hay, sumar el nuevo y guardar
            let inventario = JSON.parse(localStorage.getItem('ferre_datos')) || [];
            inventario.push(producto);
            localStorage.setItem('ferre_datos', JSON.stringify(inventario));

            // Limpiar cajas y refrescar tabla
            document.getElementById('nombre').value = "";
            document.getElementById('cantidad').value = "";
            document.getElementById('precio').value = "";
            mostrarProductos();
        }

        function mostrarProductos() {
            const tabla = document.getElementById('lista-productos');
            tabla.innerHTML = "";
            const inventario = JSON.parse(localStorage.getItem('ferre_datos')) || [];

            inventario.forEach((prod, index) => {
                tabla.innerHTML += `
                    <tr>
                        <td>${prod.nombre}</td>
                        <td>${prod.cantidad}</td>
                        <td>$${prod.precio}</td>
                        <td><button onclick="eliminar(${index})" style="background:red; padding:5px;">X</button></td>
                    </tr>
                `;
            });
        }

        function eliminar(index) {
            let inventario = JSON.parse(localStorage.getItem('ferre_datos'));
            inventario.splice(index, 1);
            localStorage.setItem('ferre_datos', JSON.stringify(inventario));
            mostrarProductos();
        }
    </script>
</body>
</html>
